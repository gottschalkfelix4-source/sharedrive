services:
  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: sharedrive-nginx
    ports:
      - "80:80"
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sharedrive-net

  backend:
    build: ./backend
    container_name: sharedrive-backend
    env_file: .env
    environment:
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - sharedrive-net

  postgres:
    image: postgres:16-alpine
    container_name: sharedrive-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharedrive}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sharedrive-net

  redis:
    image: redis:7-alpine
    container_name: sharedrive-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sharedrive-net

  minio:
    image: minio/minio:latest
    container_name: sharedrive-minio
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    restart: unless-stopped
    networks:
      - sharedrive-net

networks:
  sharedrive-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:

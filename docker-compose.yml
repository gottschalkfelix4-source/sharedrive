services:
  caddy:
    image: caddy:alpine
    container_name: sharedrive-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - sharedrive-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: sharedrive-nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sharedrive-net

  backend:
    build: ./backend
    container_name: sharedrive-backend
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - ./.env:/app/.env
      - ./Caddyfile:/app/Caddyfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
      clamav:
        condition: service_started
    restart: unless-stopped
    networks:
      - sharedrive-net

  postgres:
    image: postgres:16-alpine
    container_name: sharedrive-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharedrive}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sharedrive-net

  redis:
    image: redis:7-alpine
    container_name: sharedrive-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sharedrive-net

  minio:
    image: minio/minio:latest
    container_name: sharedrive-minio
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    ports:
      - "9001:9001"
    restart: unless-stopped
    networks:
      - sharedrive-net

  clamav:
    image: clamav/clamav:stable
    container_name: sharedrive-clamav
    environment:
      # Raise stream/file limits well above the app's default 5 GB max file size
      CLAMD_CONF_StreamMaxLength: 6144M
      CLAMD_CONF_MaxFileSize: 6144M
      CLAMD_CONF_MaxScanSize: 6144M
      CLAMD_CONF_TCPSocket: 3310
      CLAMD_CONF_TCPAddr: "0.0.0.0"
    volumes:
      - clamav_data:/var/lib/clamav
    restart: unless-stopped
    networks:
      - sharedrive-net

networks:
  sharedrive-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  clamav_data:
  caddy_data:
  caddy_config:

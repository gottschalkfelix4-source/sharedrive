services:
  caddy:
    image: caddy:alpine
    container_name: sharedrive-caddy
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - nginx
    restart: unless-stopped
    networks:
      - sharedrive-net

  nginx:
    build:
      context: .
      dockerfile: nginx/Dockerfile
    container_name: sharedrive-nginx
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - sharedrive-net

  backend:
    build: ./backend
    container_name: sharedrive-backend
    env_file: .env
    environment:
      NODE_ENV: production
    volumes:
      - ./.env:/app/.env
      - ./Caddyfile:/app/Caddyfile
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    restart: unless-stopped
    networks:
      - sharedrive-net

  postgres:
    image: postgres:16-alpine
    container_name: sharedrive-postgres
    env_file: .env
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-sharedrive}"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sharedrive-net

  redis:
    image: redis:7-alpine
    container_name: sharedrive-redis
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped
    networks:
      - sharedrive-net

  minio:
    image: minio/minio:latest
    container_name: sharedrive-minio
    command: server /data --console-address ":9001"
    env_file: .env
    volumes:
      - minio_data:/data
    # Console (port 9001) is intentionally NOT published to the host — it gives
    # full, unauthenticated-by-default access to every raw object in the bucket,
    # bypassing all app-level access control and encryption checks entirely.
    # To access it, tunnel instead of opening the port:
    #   ssh -L 9001:localhost:9001 user@your-server
    # then browse http://localhost:9001 locally.
    restart: unless-stopped
    networks:
      - sharedrive-net

networks:
  sharedrive-net:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  minio_data:
  caddy_data:
  caddy_config:
